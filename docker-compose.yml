# ═══════════════════════════════════════════════════════════════
# Molty Royale AI Bot — Docker Compose (Local Development)
# ═══════════════════════════════════════════════════════════════
# Usage:
#   1. Copy .env.example to .env and fill in your API key
#   2. docker compose up --build
# ═══════════════════════════════════════════════════════════════

services:
  molty-bot:
    build: .
    container_name: molty-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
